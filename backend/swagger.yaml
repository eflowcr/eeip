openapi: 3.0.0
info:
  title: EEIP API
  description: Executive Email Intelligence Platform API documentation
  version: 1.0.0
servers:
  - url: http://localhost:10000/api/v1
paths:
  /health:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: OK
  /emails/important:
    get:
      summary: Get important emails
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of important emails
  /accounts/{accountId}/emails:
    get:
      summary: Get emails by account ID
      parameters:
        - in: path
          name: accountId
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of emails
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
