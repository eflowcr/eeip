<div class="min-h-screen bg-gray-900 flex items-center justify-center p-4 relative overflow-hidden text-gray-200">
  <!-- Background decorators -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/20 blur-[120px]"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <div class="glass-panel p-8 rounded-2xl shadow-2xl border border-white/10 bg-white/5 backdrop-blur-xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400 mb-2">EEIP</h1>
        <p class="text-gray-400 text-sm">Plataforma de Inteligencia Ejecutiva</p>
      </div>

      <form (ngSubmit)="login()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="email" 
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none text-white placeholder-gray-500"
            placeholder="admin@example.com"
            required
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            [(ngModel)]="password" 
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none text-white placeholder-gray-500"
            placeholder="••••••••"
            required
          >
        </div>

        <div *ngIf="errorMessage" class="p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm text-center">
          {{ errorMessage }}
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading"
          class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-500/25 flex justify-center items-center gap-2 disabled:opacity-70"
        >
          <span *ngIf="isLoading" class="animate-spin w-5 h-5 border-2 border-white/20 border-t-white rounded-full"></span>
          {{ isLoading ? 'Ingresando...' : 'Iniciar Sesión' }}
        </button>
      </form>
    </div>
    <div class="text-center mt-6 text-gray-500 text-xs">
      &copy; 2026 EEIP. Todos los derechos reservados.
    </div>
  </div>
</div>
